name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: 📋 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build solution (Release)
        run: dotnet build --no-restore -c Release

      # TODO: Uncomment when test projects are added
      # - name: ✅ Run unit tests
      #   run: dotnet test --no-restore --no-build -c Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --settings ./coverage.runsettings

      # - name: 📊 Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
      #     path: '**/TestResults'

      # - name: 📈 Publish coverage reports
      #   if: matrix.os == 'ubuntu-latest' && matrix.dotnet-version == '8.0.x'
      #   uses: codecov/codecov-action@v3
      #   with:
      #     files: '**/coverage.cobertura.xml'
      #     flags: unittests
      #     name: codecov-umbrella
      #     fail_ci_if_error: false

  code-analysis:
    name: 🔍 Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: 📋 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build (Release)
        run: dotnet build --no-restore -c Release

      - name: 🔓 Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'csharp'

      - name: 🔍 Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  code-quality:
    name: 💭 SonarQube Code Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📋 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build
        run: dotnet build --no-restore -c Release

      - name: 🧹 SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=SouravDas_RepoKit
            -Dsonar.organization=soravdas

  lint:
    name: 🎨 Linting & Formatting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📋 Restore dependencies
        run: dotnet restore

      - name: 🎨 Check code formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: 📚 Check XML documentation
        run: dotnet build --no-restore -c Release /p:DocumentationFile=bin/docs.xml /p:TreatWarningsAsErrors=true

  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  coverage:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📋 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build
        run: dotnet build --no-restore -c Release

      # TODO: Uncomment when test projects are added
      # - name: ✅ Run tests with coverage
      #   run: dotnet test --no-restore --no-build -c Release --collect:"XPlat Code Coverage" --settings ./coverage.runsettings

      # - name: 📊 Generate coverage report
      #   uses: irongut/CodeCoverageSummary@v1.3.0
      #   with:
      #     filename: '**/coverage.cobertura.xml'
      #     badge: true
      #     format: 'markdown'
      #     output: 'both'

      # - name: 💬 Add coverage comment to PR
      #   if: github.event_name == 'pull_request'
      #   uses: actions/github-script@v6
      #   with:
      #     script: |
      #       const fs = require('fs');
      #       const coverage = fs.readFileSync('code-coverage-results.md', 'utf8');
      #       github.rest.issues.createComment({
      #         issue_number: context.issue.number,
      #         owner: context.repo.owner,
#              repo: context.repo.repo,
#              body: coverage
#              });

  validate:
    name: ✅ Validation
    runs-on: ubuntu-latest
    needs: [build, code-analysis]
    if: always()

    steps:
      - name: ✅ Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [ "${{ needs.code-analysis.result }}" != "success" ]; then
            echo "⚠️ Code analysis failed"
          fi
          echo "✅ All validations passed"
