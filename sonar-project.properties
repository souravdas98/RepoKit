# SonarQube Configuration for RepoKit
# https://docs.sonarqube.org/latest/analysis/overview/

sonar.projectKey=SouravDas_RepoKit
sonar.projectName=RepoKit
sonar.projectVersion=1.0.0
sonar.projectDescription=A lightweight .NET repository pattern library with automatic DI registration

# Source code location
sonar.sources=src
# sonar.tests=tests
sonar.exclusions=**/bin/**,**/obj/**,**/.git/**

# C# specific settings
sonar.language=cs
sonar.csharp.excludes=**/bin/**,**/obj/**

# Code coverage
sonar.cs.coverage.reportPaths=**/coverage.cobertura.xml
# sonar.coverage.exclusions=**/Tests/**,**/*.Tests/**

# Test execution
# sonar.cs.vstest.reportsPaths=**/TestResults/*.trx

# Rules and quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Organization (for SonarCloud)
sonar.organization=souravdas

# Network (SonarCloud)
sonar.host.url=https://sonarcloud.io

# Encoding
sonar.encoding=UTF-8

# C# Code analysis
sonar.cs.analyzer.projectOutPath=bin/Release

# Issue resolution
sonar.scm.provider=git
sonar.scm.forceReloadBefore=false

# Duplications
# sonar.cpd.exclusions=**/Tests/**,**/*.Tests/**

# Security metrics
sonar.security.hotspots.exclusions=

# Rules
sonar.rules.externalIssueReportPaths=
